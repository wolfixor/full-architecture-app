apiVersion: v1
kind: Service
metadata:
  name: task-api
  namespace: task-api
  labels:
    app: task-api
spec:
  type: NodePort
  ports:
    - port: 80
      protocol: TCP
      targetPort: 8000
      nodePort: 30081
  selector:
    app: task-api
---
apiVersion: v1
kind: Service
metadata:
  name: task-api-redis
  namespace: task-api
spec:
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
  selector:
    app: task-api-redis
---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: task-api
spec:
  selector:
    app: postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  type: ClusterIP